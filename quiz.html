<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题 - 初中地理学习平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-earth-asia text-blue-600 text-xl"></i>
            <span class="font-bold text-gray-800">地理学堂 - 答题</span>
        </div>
        <button onclick="goBack()" class="text-gray-600 hover:text-blue-600">
            <i class="fa-solid fa-arrow-left"></i> 返回
        </button>
    </nav>

    <main class="max-w-2xl mx-auto mt-8 px-4">
        <!-- 答题进度 -->
        <div class="bg-white rounded-xl p-4 shadow-sm mb-6">
            <div class="flex justify-between text-sm text-gray-600 mb-2">
                <span id="progressText">1/5</span>
                <span id="scoreText" class="text-green-600 font-bold">得分: 0</span>
            </div>
            <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-blue-600 transition-all duration-300" style="width: 20%"></div>
            </div>
        </div>

        <!-- 题目卡片 -->
        <div class="bg-white rounded-2xl p-6 shadow-sm">
            <h2 id="questionText" class="text-lg font-bold text-gray-800 mb-6">题目加载中...</h2>
            
            <div id="optionsContainer" class="space-y-3">
                <!-- 选项将动态生成 -->
            </div>

            <!-- 提交按钮 -->
            <div id="actionButtons" class="mt-6">
                <button onclick="submitAnswer()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors">
                    提交答案
                </button>
            </div>

            <!-- 下一题按钮 -->
            <div id="nextButton" class="mt-6" style="display: none;">
                <button onclick="nextQuestion()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition-colors">
                    下一题
                </button>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="resultPage" class="hidden">
            <div class="bg-white rounded-2xl p-8 shadow-sm text-center">
                <i class="fa-solid fa-trophy text-5xl text-yellow-500 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">答题完成！</h2>
                <p class="text-gray-600 mb-6">你的得分</p>
                <div id="finalScore" class="text-4xl font-bold text-green-600 mb-6">0</div>
                <div class="flex gap-4">
                    <button onclick="retryQuiz()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl">
                        再做一遍
                    </button>
                    <button onclick="goBack()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 rounded-xl">
                        返回主页
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 初始化 Supabase
        const SUPABASE_URL = 'https://adcdrzzyhveuhxchqbcs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KFqWdKhpA-IJCRG3h6crvA_tEQtC4wI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let selectedIndex = -1;
        let answered = false;

        // 页面加载时验证用户身份
        window.onload = async () => {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            // 加载题目
            const savedQuestions = localStorage.getItem('geo_quiz_questions');
            if (!savedQuestions) {
                alert('没有找到题目，请先选择章节');
                window.location.href = 'main.html';
                return;
            }
            
            questions = JSON.parse(savedQuestions);
            currentIndex = parseInt(localStorage.getItem('geo_quiz_index') || '0');
            score = parseInt(localStorage.getItem('geo_quiz_score') || '0');
            
            showQuestion();
        };

        function showQuestion() {
            if (currentIndex >= questions.length) {
                showResult();
                return;
            }
            
            const q = questions[currentIndex];
            document.getElementById('progressText').innerText = (currentIndex + 1) + '/' + questions.length;
            document.getElementById('scoreText').innerText = '得分: ' + score;
            document.getElementById('progressBar').style.width = ((currentIndex + 1) / questions.length * 100) + '%';
            
            document.getElementById('questionText').innerText = q.q;
            
            // 打乱选项
            let options = [...q.options];
            let correctText = options[q.a];
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            q.shuffledOptions = options;
            q.correctIndex = options.indexOf(correctText);
            
            const optionsHtml = options.map((opt, i) => `
                <div class="option-item p-4 border-2 border-gray-200 rounded-xl cursor-pointer transition-all hover:border-blue-400" onclick="selectOption(${i})">
                    <span class="font-bold text-gray-700">${String.fromCharCode(65+i)}.</span> ${opt}
                </div>
            `).join('');
            
            document.getElementById('optionsContainer').innerHTML = optionsHtml;
            
            selectedIndex = -1;
            answered = false;
            document.getElementById('actionButtons').style.display = 'block';
            document.getElementById('nextButton').style.display = 'none';
            document.getElementById('resultPage').classList.add('hidden');
        }

        function selectOption(index) {
            if (answered) return;
            
            selectedIndex = index;
            document.querySelectorAll('.option-item').forEach((el, i) => {
                if (i === index) {
                    el.classList.add('border-blue-500', 'bg-blue-50');
                } else {
                    el.classList.remove('border-blue-500', 'bg-blue-50');
                }
            });
        }

        function submitAnswer() {
            if (selectedIndex < 0) {
                alert('请选择一个选项');
                return;
            }
            
            answered = true;
            const q = questions[currentIndex];
            const options = document.querySelectorAll('.option-item');
            
            options.forEach((el, i) => {
                el.classList.remove('hover:border-blue-400', 'cursor-pointer');
                if (i === q.correctIndex) {
                    el.classList.add('border-green-500', 'bg-green-50');
                } else if (i === selectedIndex) {
                    el.classList.add('border-red-500', 'bg-red-50');
                }
            });
            
            if (selectedIndex === q.correctIndex) {
                score += 20;
                document.getElementById('scoreText').innerText = '得分: ' + score;
            }
            
            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('nextButton').style.display = 'block';
        }

        function nextQuestion() {
            currentIndex++;
            localStorage.setItem('geo_quiz_index', currentIndex);
            localStorage.setItem('geo_quiz_score', score);
            showQuestion();
        }

        function showResult() {
            document.getElementById('progressText').innerText = '完成';
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('finalScore').innerText = score + '/' + (questions.length * 20);
            
            // 保存学习进度
            const chapter = localStorage.getItem('geo_current_chapter');
            if (chapter) {
                const learned = JSON.parse(localStorage.getItem('geo_learned') || '{}');
                learned[chapter] = true;
                localStorage.setItem('geo_learned', JSON.stringify(learned));
            }
            
            document.querySelector('main > div').forEach(el => el.style.display = 'none');
            document.getElementById('resultPage').classList.remove('hidden');
        }

        function retryQuiz() {
            localStorage.setItem('geo_quiz_index', '0');
            localStorage.setItem('geo_quiz_score', '0');
            currentIndex = 0;
            score = 0;
            showQuestion();
        }

        function goBack() {
            window.location.href = 'main.html';
        }
    </script>
</body>
</html>
