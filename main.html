<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 - 初中地理学习平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chapter-card { transition: all 0.2s; }
        .chapter-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-earth-asia text-blue-600 text-2xl"></i>
            <span class="text-xl font-bold text-gray-800">地理学堂</span>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm text-gray-600" id="userEmailDisplay">加载中...</span>
            <button onclick="logout()" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-md text-sm transition-colors">退出登录</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto mt-8 px-4">
        <div class="bg-white rounded-2xl shadow-sm p-8 text-center border border-gray-100 mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">欢迎来到初中地理学习平台！</h1>
            <p class="text-gray-500">探索世界，掌握地理知识。请选择下方模块开始学习。</p>
        </div>

        <!-- 章节选择 -->
        <div class="mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4">📚 选择章节</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="chapter-card bg-gradient-to-br from-blue-50 to-blue-100 p-6 rounded-xl border border-blue-200 cursor-pointer text-center" onclick="selectChapter(1)">
                    <i class="fa-solid fa-mountain text-3xl text-blue-600 mb-3"></i>
                    <h3 class="font-bold text-gray-800">第一章</h3>
                    <p class="text-sm text-gray-600">中国的地形</p>
                </div>
                <div class="chapter-card bg-gradient-to-br from-orange-50 to-orange-100 p-6 rounded-xl border border-orange-200 cursor-pointer text-center" onclick="selectChapter(2)">
                    <i class="fa-solid fa-temperature-half text-3xl text-orange-600 mb-3"></i>
                    <h3 class="font-bold text-gray-800">第二章</h3>
                    <p class="text-sm text-gray-600">中国的气候</p>
                </div>
                <div class="chapter-card bg-gradient-to-br from-cyan-50 to-cyan-100 p-6 rounded-xl border border-cyan-200 cursor-pointer text-center" onclick="selectChapter(3)">
                    <i class="fa-solid fa-water text-3xl text-cyan-600 mb-3"></i>
                    <h3 class="font-bold text-gray-800">第三章</h3>
                    <p class="text-sm text-gray-600">中国的河流</p>
                </div>
                <div class="chapter-card bg-gradient-to-br from-green-50 to-green-100 p-6 rounded-xl border border-green-200 cursor-pointer text-center" onclick="selectChapter(4)">
                    <i class="fa-solid fa-leaf text-3xl text-green-600 mb-3"></i>
                    <h3 class="font-bold text-gray-800">第四章</h3>
                    <p class="text-sm text-gray-600">自然资源</p>
                </div>
            </div>
        </div>

        <!-- 学习功能 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer text-center" onclick="showKnowledge()">
                <i class="fa-solid fa-book-open text-3xl text-blue-500 mb-3"></i>
                <h3 class="font-bold text-gray-800">知识点归纳</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer text-center" onclick="startQuiz()">
                <i class="fa-solid fa-pen-to-square text-3xl text-indigo-500 mb-3"></i>
                <h3 class="font-bold text-gray-800">章节题库</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer text-center">
                <i class="fa-solid fa-map-location-dot text-3xl text-emerald-500 mb-3"></i>
                <h3 class="font-bold text-gray-800">高清地图库</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer text-center">
                <i class="fa-solid fa-book-skull text-3xl text-rose-500 mb-3"></i>
                <h3 class="font-bold text-gray-800">我的错题本</h3>
            </div>
        </div>
    </main>

    <script>
        // 初始化 Supabase
        const SUPABASE_URL = 'https://adcdrzzyhveuhxchqbcs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KFqWdKhpA-IJCRG3h6crvA_tEQtC4wI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentChapter = 1;

        // 知识点数据
        const knowledgeData = {
            1: { title: "第一章 中国的地形", content: `
                <h3 class="text-lg font-bold mb-3">一、地形特征</h3>
                <ul class="list-disc pl-5 mb-4 space-y-2">
                    <li><strong>地形复杂多样：</strong>山区面积广大（占全国总面积2/3）</li>
                    <li><strong>地势西高东低：</strong>呈三级阶梯分布</li>
                </ul>
                <h3 class="text-lg font-bold mb-3">二、主要地形区</h3>
                <ul class="list-disc pl-5 mb-4 space-y-2">
                    <li><strong>四大高原：</strong>青藏高原、内蒙古高原、黄土高原、云贵高原</li>
                    <li><strong>四大盆地：</strong>塔里木盆地、准噶尔盆地、柴达木盆地、四川盆地</li>
                    <li><strong>三大平原：</strong>东北平原、华北平原、长江中下游平原</li>
                </ul>
            `},
            2: { title: "第二章 中国的气候", content: `
                <h3 class="text-lg font-bold mb-3">一、气候特征</h3>
                <ul class="list-disc pl-5 mb-4 space-y-2">
                    <li><strong>气候复杂多样：</strong>有温带、亚热带、热带等气候</li>
                    <li><strong>季风气候显著：</strong>冬季盛行偏北风，夏季盛行偏南风</li>
                </ul>
                <h3 class="text-lg font-bold mb-3">二、温度带</h3>
                <ul class="list-disc pl-5 space-y-2">
                    <li><strong>寒温带：</strong>黑龙江北部</li>
                    <li><strong>中温带：</strong>东北、内蒙古</li>
                    <li><strong>暖温带：</strong>黄河流域</li>
                    <li><strong>亚热带：</strong>长江流域</li>
                    <li><strong>热带：</strong>海南岛</li>
                </ul>
            `},
            3: { title: "第三章 中国的河流", content: `
                <h3 class="text-lg font-bold mb-3">一、主要河流</h3>
                <ul class="list-disc pl-5 mb-4 space-y-2">
                    <li><strong>长江：</strong>中国第一大河，世界第三长河</li>
                    <li><strong>黄河：</strong>含沙量大，下游形成"地上河"</li>
                </ul>
                <h3 class="text-lg font-bold mb-3">二、河流特征</h3>
                <ul class="list-disc pl-5 space-y-2">
                    <li>以内流河为主</li>
                    <li>受季风影响，流量季节变化大</li>
                    <li>东部河流冬季结冰</li>
                </ul>
            `},
            4: { title: "第四章 自然资源", content: `
                <h3 class="text-lg font-bold mb-3">一、自然资源分类</h3>
                <ul class="list-disc pl-5 mb-4 space-y-2">
                    <li><strong>可再生资源：</strong>土地、水、森林</li>
                    <li><strong>非可再生资源：</strong>矿产</li>
                </ul>
                <h3 class="text-lg font-bold mb-3">二、土地资源</h3>
                <ul class="list-disc pl-5 mb-4 space-y-2">
                    <li>耕地主要分布在东部平原</li>
                    <li>林地主要分布在东北、西南</li>
                    <li>草地主要分布在内蒙古、新疆</li>
                </ul>
                <h3 class="text-lg font-bold mb-3">三、水资源</h3>
                <p>南多北少，东多西少。</p>
            `}
        };

        // 题库
        const questionBank = {
            1: [
                { q: "中国地形的主要特征是？", options: ["地形复杂多样，山区面积广大", "以平原为主", "以高原为主", "地形单一"], a: 0 },
                { q: "下列哪个不是四大高原？", options: ["青藏高原", "黄土高原", "华北高原", "内蒙古高原"], a: 2 },
                { q: "中国地势特点是？", options: ["东高西低", "西高东低", "南高北低", "北高南低"], a: 1 },
                { q: "位于第一级阶梯的高原是？", options: ["内蒙古高原", "黄土高原", "青藏高原", "云贵高原"], a: 2 },
                { q: "中国面积最大的盆地是？", options: ["四川盆地", "柴达木盆地", "塔里木盆地", "准噶尔盆地"], a: 2 }
            ],
            2: [
                { q: "中国气候的主要特征是？", options: ["气候单一", "季风气候显著", "全年高温", "无季风影响"], a: 1 },
                { q: "夏季盛行的风是？", options: ["西北风", "东北风", "东南风", "西南风"], a: 2 },
                { q: "秦岭-淮河一线是哪些分界线？", options: ["暖温带与亚热带", "热带与亚热带", "湿润区与半湿润区", "暖温带与中温带"], a: 0 },
                { q: "北京属于哪个温度带？", options: ["暖温带", "中温带", "亚热带", "热带"], a: 0 },
                { q: "造成中国气候复杂多样的原因是？", options: ["纬度跨度大", "经度跨度大", "地形复杂", "以上都是"], a: 3 }
            ],
            3: [
                { q: "中国第一大河是？", options: ["黄河", "长江", "珠江", "黑龙江"], a: 1 },
                { q: "黄河下游的主要问题是？", options: ["断流", "洪涝", "含沙量大", "结冰期长"], a: 2 },
                { q: "长江发源于哪个高原？", options: ["青藏高原", "内蒙古高原", "黄土高原", "云贵高原"], a: 0 },
                { q: "以下哪个不是内流河？", options: ["塔里木河", "黄河", "额尔齐斯河", "黑河"], a: 1 },
                { q: "河流流量主要受什么影响？", options: ["地形", "季风", "植被", "土壤"], a: 1 }
            ],
            4: [
                { q: "以下哪个是可再生资源？", options: ["煤炭", "石油", "森林", "铁矿"], a: 2 },
                { q: "中国耕地主要分布在？", options: ["西部高原", "东部平原", "北部山区", "南部丘陵"], a: 1 },
                { q: "水资源空间分布特点是？", options: ["南多北少", "北多南少", "东少西多", "均匀分布"], a: 0 },
                { q: "林地主要分布在？", options: ["西北地区", "华北平原", "东北和西南", "东部沿海"], a: 2 },
                { q: "解决水资源时间分布不均的措施是？", options: ["跨流域调水", "修建水库", "节约用水", "海水淡化"], a: 1 }
            ]
        };

        // 页面加载时验证用户身份
        window.onload = async () => {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('userEmailDisplay').innerText = `当前用户: ${user.email}`;
        };

        // 退出登录逻辑
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        function selectChapter(chapterId) {
            currentChapter = chapterId;
            localStorage.setItem('geo_current_chapter', chapterId);
            alert('已选择第' + chapterId + '章，点击"章节题库"开始答题');
        }

        function showKnowledge() {
            const chapter = parseInt(localStorage.getItem('geo_current_chapter') || '1');
            const data = knowledgeData[chapter];
            const content = `<div class="bg-white rounded-2xl p-6 shadow-sm">
                <h2 class="text-xl font-bold mb-4">${data.title}</h2>
                <div class="text-gray-700 leading-relaxed">${data.content}</div>
                <button onclick="startQuiz()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg">开始答题</button>
            </div>`;
            
            const modal = document.createElement('div');
            modal.id = 'knowledgeModal';
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50';
            modal.innerHTML = content;
            modal.onclick = function(e) {
                if(e.target === modal) modal.remove();
            };
            document.body.appendChild(modal);
        }

        function startQuiz() {
            const chapter = parseInt(localStorage.getItem('geo_current_chapter') || '1');
            let questions = [...questionBank[chapter]];
            
            // 打乱顺序
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
            
            localStorage.setItem('geo_quiz_questions', JSON.stringify(questions));
            localStorage.setItem('geo_quiz_index', '0');
            localStorage.setItem('geo_quiz_score', '0');
            
            window.location.href = 'quiz.html';
        }
    </script>
</body>
</html>
