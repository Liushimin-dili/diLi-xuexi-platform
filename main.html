<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学生端 - 初中地理学堂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .nav-active { color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <header class="bg-blue-600 text-white p-4 pt-10 rounded-b-3xl shadow-lg">
        <div class="flex justify-between items-center">
            <div>
                <h1 id="pageTitle" class="text-xl font-bold">地理主页</h1>
                <p class="text-xs opacity-80">欢迎回来，开启今日探索</p>
            </div>
            <button onclick="location.href='index.html'" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24">
        
        <div id="view-home" class="tab-content active-tab space-y-6">
            <div class="bg-orange-50 p-4 rounded-2xl flex items-center gap-3 border border-orange-100">
                <i class="fa-solid fa-bullhorn text-orange-500"></i>
                <p class="text-sm text-orange-800">公告：八年级模拟考真题已更新！</p>
            </div>
            
            <div class="grid grid-cols-4 gap-4">
                <div onclick="switchTab('knowledge')" class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 text-xl shadow-sm"><i class="fa-solid fa-book"></i></div>
                    <span class="text-xs font-medium">知识点</span>
                </div>
                <div onclick="switchTab('map')" class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-emerald-100 rounded-2xl flex items-center justify-center text-emerald-600 text-xl shadow-sm"><i class="fa-solid fa-map"></i></div>
                    <span class="text-xs font-medium">地图库</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-purple-100 rounded-2xl flex items-center justify-center text-purple-600 text-xl shadow-sm"><i class="fa-solid fa-file-signature"></i></div>
                    <span class="text-xs font-medium">真题库</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-rose-100 rounded-2xl flex items-center justify-center text-rose-600 text-xl shadow-sm"><i class="fa-solid fa-book-skull"></i></div>
                    <span class="text-xs font-medium">错题本</span>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-4 shadow-sm">
                <h3 class="font-bold mb-4">学习统计</h3>
                <div class="flex justify-around border-t pt-4">
                    <div class="text-center"><p class="text-lg font-bold">12</p><p class="text-[10px] text-gray-400">已学章节</p></div>
                    <div class="text-center"><p class="text-lg font-bold text-green-500">88%</p><p class="text-[10px] text-gray-400">正确率</p></div>
                    <div class="text-center"><p class="text-lg font-bold text-blue-500">2.5h</p><p class="text-[10px] text-gray-400">学习时长</p></div>
                </div>
            </div>
        </div>

        <div id="view-knowledge" class="tab-content space-y-4">
            <h3 class="font-bold text-lg">八年级·上册</h3>
            <div class="bg-white rounded-xl p-4 flex justify-between items-center shadow-sm">
                <div><p class="font-medium">第一章：从世界看中国</p><p class="text-xs text-gray-400">重点：疆域、人口、民族</p></div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </div>
            <div class="bg-white rounded-xl p-4 flex justify-between items-center shadow-sm border-l-4 border-blue-500">
                <div><p class="font-medium">第二章：中国的自然环境</p><p class="text-xs text-gray-400">重点：地形、气候、河流</p></div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </div>
        </div>

        <div id="view-map" class="tab-content grid grid-cols-2 gap-4">
            <div class="bg-white p-2 rounded-xl shadow-sm">
                <div class="bg-gray-200 aspect-video rounded-lg mb-2 flex items-center justify-center text-gray-400"><i class="fa-solid fa-image text-2xl"></i></div>
                <p class="text-xs font-bold text-center">中国政区图</p>
            </div>
            <div class="bg-white p-2 rounded-xl shadow-sm">
                <div class="bg-gray-200 aspect-video rounded-lg mb-2 flex items-center justify-center text-gray-400"><i class="fa-solid fa-image text-2xl"></i></div>
                <p class="text-xs font-bold text-center">中国地形图</p>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3 pb-6">
        <button onclick="switchTab('home')" class="nav-item nav-active flex flex-col items-center gap-1">
            <i class="fa-solid fa-house text-xl"></i><span class="text-[10px]">首页</span>
        </button>
        <button onclick="switchTab('knowledge')" class="nav-item text-gray-300 flex flex-col items-center gap-1">
            <i class="fa-solid fa-book-open text-xl"></i><span class="text-[10px]">知识点</span>
        </button>
        <button onclick="switchTab('map')" class="nav-item text-gray-300 flex flex-col items-center gap-1">
            <i class="fa-solid fa-map-marked-alt text-xl"></i><span class="text-[10px]">地图库</span>
        </button>
        <button class="nav-item text-gray-300 flex flex-col items-center gap-1">
            <i class="fa-regular fa-user text-xl"></i><span class="text-[10px]">我的</span>
        </button>
    </nav>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById('view-' + tabId).classList.add('active-tab');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.add('text-gray-300'));
            // 简单的UI反馈逻辑
            const titles = { 'home': '地理主页', 'knowledge': '知识百科', 'map': '地图资源' };
            document.getElementById('pageTitle').innerText = titles[tabId];
        }
    </script>
</body>
</html>
