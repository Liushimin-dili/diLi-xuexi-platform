                { id: '4-3', title: '工业', content: '中国四大工业基地：辽中南（重工业）、京津唐（北方综合性）、沪宁杭（全国最大）、珠江三角洲（外向型）。' },
                { id: '4-4', title: '高新技术产业', content: '高新技术产业分布：东部沿海地区为主，大中城市周围。代表产业：信息技术、生物技术、新能源、新材料。' }
            ]}
        ];
        
        const questions = [
            // 第一章
            { chapter: 1, type: 'choice', q: "中国位于哪个大洲？", options: ["亚洲", "欧洲", "北美洲", "非洲"], a: 0 },
            { chapter: 1, type: 'choice', q: "中国陆地面积约多少万平方千米？", options: ["960万", "9600万", "96万", "9.6万"], a: 0 },
            { chapter: 1, type: 'choice', q: "中国最北端位于哪个省？", options: ["黑龙江", "吉林", "辽宁", "内蒙古"], a: 0 },
            { chapter: 1, type: 'choice', q: "中国人口地理分界线是？", options: ["黑河-腾冲线", "长江-黄河线", "京沪线", "陇海线"], a: 0 },
            { chapter: 1, type: 'choice', q: "中国56个民族中人口最多的是？", options: ["汉族", "壮族", "满族", "回族"], a: 0 },
            { chapter: 1, type: 'choice', q: "中国陆上邻国数量是？", options: ["14个", "12个", "10个", "8个"], a: 0 },
            { chapter: 1, type: 'choice', q: "中国濒临的海洋从北到南依次是？", options: ["渤海、黄海、东海、南海", "黄海、渤海、东海、南海", "东海、黄海、渤海、南海", "南海、东海、黄海、渤海"], a: 0 },
            // 第二章
            { chapter: 2, type: 'choice', q: "中国地势特点是什么？", options: ["西高东低", "东高西低", "南高北低", "北高南低"], a: 0 },
            { chapter: 2, type: 'choice', q: "中国第一级阶梯主要地形区是？", options: ["青藏高原", "内蒙古高原", "黄土高原", "云贵高原"], a: 0 },
            { chapter: 2, type: 'choice', q: "长江注入哪个海洋？", options: ["东海", "黄海", "渤海", "南海"], a: 0 },
            { chapter: 2, type: 'choice', q: "黄河含沙量在世界河流中排名？", options: ["第一位", "第二位", "第三位", "第四位"], a: 0 },
            { chapter: 2, type: 'choice', q: "中国季风气候的特点是？", options: ["雨热同期", "全年温和", "全年炎热", "冬季多雨"], a: 0 },
            { chapter: 2, type: 'choice', q: "中国最大的湖泊是？", options: ["青海湖", "鄱阳湖", "洞庭湖", "太湖"], a: 0 },
            { chapter: 2, type: 'choice', q: "世界最高峰位于哪个山脉？", options: ["喜马拉雅山", "昆仑山", "天山", "大兴安岭"], a: 0 },
            // 第三章
            { chapter: 3, type: 'choice', q: "以下哪个是非可再生资源？", options: ["矿产资源", "土地资源", "水资源", "森林资源"], a: 0 },
            { chapter: 3, type: 'choice', q: "中国水资源分布特点是？", options: ["南多北少", "北多南少", "东多西少", "西多东少"], a: 0 },
            { chapter: 3, type: 'choice', q: "南水北调工程中线取水地点是？", options: ["丹江口水库", "三峡", "扬州", "小浪底"], a: 0 },
            { chapter: 3, type: 'choice', q: "中国土地利用类型中面积最大的是？", options: ["草地", "林地", "耕地", "建筑用地"], a: 0 },
            { chapter: 3, type: 'choice', q: "解决水资源时间分布不均的主要措施是？", options: ["修建水库", "跨流域调水", "节约用水", "人工降雨"], a: 0 },
            // 第四章
            { chapter: 4, type: 'choice', q: "中国最重要的交通运输方式是？", options: ["铁路", "公路", "航空", "水路"], a: 0 },
            { chapter: 4, type: 'choice', q: "中国最大综合性工业基地是？", options: ["沪宁杭", "辽中南", "京津唐", "珠江三角洲"], a: 0 },
            { chapter: 4, type: 'choice', q: "中国南方主要耕地类型是？", options: ["水田", "旱地", "草地", "林地"], a: 0 },
            { chapter: 4, type: 'choice', q: "高新技术产业主要分布在？", options: ["东部沿海", "西部内陆", "中部地区", "南北极"], a: 0 },
            { chapter: 4, type: 'choice', q: "中国农产品产量居世界首位的是？", options: ["粮食", "棉花", "油料", "糖料"], a: 0 },
            { chapter: 4, type: 'choice', q: "被称为"工业血液"的是？", options: ["石油", "煤炭", "铁矿石", "稀土"], a: 0 }
        ];
        
        // 真题数据
        const exams = [
            { id: 1, year: '2024', region: '上海', title: '2024年上海市中考地理真题', questions: 25, time: 60, score: 100 },
            { id: 2, year: '2024', region: '北京', title: '2024年北京市中考地理真题', questions: 25, time: 60, score: 100 },
            { id: 3, year: '2024', region: '广东', title: '2024年广东省中考地理真题', questions: 25, time: 60, score: 100 },
            { id: 4, year: '2023', region: '上海', title: '2023年上海市中考地理真题', questions: 25, time: 60, score: 100 },
            { id: 5, year: '2023', region: '北京', title: '2023年北京市中考地理真题', questions: 25, time: 60, score: 100 },
            { id: 6, year: '2023', region: '广东', title: '2023年广东省中考地理真题', questions: 25, time: 60, score: 100 },
            { id: 7, year: '2022', region: '上海', title: '2022年上海市中考地理真题', questions: 25, time: 60, score: 100 },
            { id: 8, year: '2022', region: '北京', title: '2022年北京市中考地理真题', questions: 25, time: 60, score: 100 },
            { id: 9, year: '2022', region: '江苏', title: '2022年江苏省中考地理真题', questions: 25, time: 60, score: 100 }
        ];
        
        let mockExamQuestions = [];
        let mockExamAnswers = {};
        let mockExamIndex = 0;
        let mockExamScore = 0;
        let examTimer = null;
        
        // 渲染真题列表
        function renderExamList(list) {
            let html = '';
            list.forEach(exam => {
                html += `<div class="bg-white p-3 rounded-lg shadow-sm">
                    <h3 class="font-medium text-sm">${exam.title}</h3>
                    <p class="text-xs text-gray-500 mt-1">${exam.region} | 满分${exam.score}分 | 时间${exam.time}分钟</p>
                    <button onclick="startExam(${exam.id})" class="mt-2 bg-blue-500 text-white px-3 py-1 rounded text-xs">开始作答</button>
                </div>`;
            });
            document.getElementById('examList').innerHTML = html;
        }
        
        function filterExam(year) {
            if(year === 'all') {
                renderExamList(exams);
            } else {
                renderExamList(exams.filter(e => e.year === year));
            }
        }
        
        function startExam(examId) {
            // 模拟考试 - 随机25题
            startMockExam();
        }
        
        function startMockExam() {
            // 随机抽取25题
            const shuffled = [...questions].sort(() => Math.random() - 0.5);
            mockExamQuestions = shuffled.slice(0, 25);
            mockExamAnswers = {};
            mockExamIndex = 0;
            mockExamScore = 0;
            
            document.getElementById('homeTab').classList.add('hidden');
            document.getElementById('examTab').classList.add('hidden');
            document.getElementById('quizTab').classList.remove('hidden');
            
            renderMockExam();
            
            // 启动计时器
            let timeLeft = 60 * 60; // 60分钟
            examTimer = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('examTimer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
                if(timeLeft <= 0) {
                    clearInterval(examTimer);
                    submitMockExam();
                }
            }, 1000);
        }
        
        function renderMockExam() {
            if(mockExamIndex >= mockExamQuestions.length) {
                submitMockExam();
                return;
            }
            const q = mockExamQuestions[mockExamIndex];
            let html = `<div class="flex justify-between items-center mb-2">
                <span class="text-sm text-gray-500">${mockExamIndex + 1}/${mockExamQuestions.length}</span>
                <span id="examTimer" class="text-sm text-red-500">60:00</span>
            </div>
            <p class="font-medium mb-3">${q.q}</p><div class="space-y-2">`;
            q.options.forEach((o, i) => {
                const checked = mockExamAnswers[mockExamIndex] === i ? 'checked' : '';
                html += `<label class="flex items-center p-2 bg-gray-50 rounded cursor-pointer">
                    <input type="radio" name="answer" value="${i}" ${checked} class="mr-2" onchange="saveMockAnswer(${i})">
                    <span class="text-sm">${o}</span>
                </label>`;
            });
            html += `</div>`;
            document.getElementById('quizContent').innerHTML = html;
            
            // 更新按钮
            const nextBtn = document.getElementById('nextBtn');
            if(mockExamIndex === mockExamQuestions.length - 1) {
                nextBtn.innerText = '交卷';
                nextBtn.onclick = submitMockExam;
            } else {
                nextBtn.innerText = '下一题';
                nextBtn.onclick = nextMockQuestion;
            }
        }
        
        function saveMockAnswer(i) {
            mockExamAnswers[mockExamIndex] = i;
        }
        
        function nextMockQuestion() {
            mockExamIndex++;
            renderMockExam();
        }
        
        function prevMockQuestion() {
            if(mockExamIndex > 0) {
                mockExamIndex--;
                renderMockExam();
            }
        }
        
        function submitMockExam() {
            if(examTimer) clearInterval(examTimer);
            
            mockExamScore = 0;
            mockExamQuestions.forEach((q, i) => {
                if(mockExamAnswers[i] === q.a) mockExamScore++;
            });
            
            const percent = Math.round((mockExamScore / mockExamQuestions.length) * 100);
            
            alert(`考试完成！\n得分：${mockExamScore}/${mockExamQuestions.length} (${percent}%)\n正确${mockExamScore}题，错误${mockExamQuestions.length - mockExamScore}题`);
            
            showTab('home');
        }
        
        // 初始化
        window.onload = function() {
            const user = localStorage.getItem('geo_user');
            if(user) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                const u = JSON.parse(user);
                document.getElementById('userEmail').innerText = u.email;
                loadData();
            }
        };
        
        function loadData() {
            renderKnowledgeList();
            renderQuestionList(questions);
            renderWrongList();
            renderFavoritesList();
            updateStats();
        }
        
        // 标签切换
        function showTab(tab) {
            document.getElementById('homeTab').classList.add('hidden');
            document.getElementById('knowledgeTab').classList.add('hidden');
            document.getElementById('questionsTab').classList.add('hidden');
            document.getElementById('examTab').classList.add('hidden');
            document.getElementById('mapsTab').classList.add('hidden');
            document.getElementById('wrongTab').classList.add('hidden');
            document.getElementById('favoritesTab').classList.add('hidden');
            document.getElementById('downloadsTab').classList.add('hidden');
            document.getElementById('profileTab').classList.add('hidden');
            document.getElementById('quizTab').classList.add('hidden');
            document.getElementById('knowledgeDetailTab').classList.add('hidden');
            
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            currentTab = tab;
        }
        
        // 渲染知识点列表
        function renderKnowledgeList(list) {
            let html = '';
            list.forEach(ch => {
                html += `<div class="bg-white rounded-lg shadow-sm overflow-hidden mb-2">
                    <div class="bg-blue-50 p-3 font-medium text-sm">${ch.grade} - ${ch.title}</div>
                    <div class="p-2">`;
                ch.sections.forEach((s, i) => {
                    html += `<button onclick="showSection('${s.id}', '${s.title}', '${s.content}')" class="block w-full text-left p-2 text-sm text-gray-600 hover:bg-gray-50 rounded">${s.title}</button>`;
                });
                html += `</div></div>`;
            });
            document.getElementById('knowledgeList').innerHTML = html;
        }
        
        function filterKnowledge(grade) {
            if(grade === 'all') {
                renderKnowledgeList(chapters);
            } else {
                renderKnowledgeList(chapters.filter(ch => ch.grade === grade));
            }
        }
        
        function showSection(id, title, content) {
            learned[id] = true;
            localStorage.setItem('geo_learned', JSON.stringify(learned));
            document.getElementById('detailTitle').innerText = title;
            document.getElementById('detailContent').innerText = content;
            showTab('knowledgeDetail');
            updateStats();
        }
        
        function toggleFav() {
            alert('已收藏');
        }
        
        // 渲染题库
        function renderQuestionList(list) {
            let html = '';
            list.forEach((q, i) => {
                html += `<div class="bg-white p-3 rounded-lg shadow-sm">
                    <p class="text-sm font-medium mb-2">${i+1}. ${q.q}</p>
                    <div class="flex flex-wrap gap-1">`;
                q.options.forEach((o, j) => {
                    html += `<span class="px-2 py-1 bg-gray-100 rounded text-xs">${String.fromCharCode(65+j)}. ${o}</span>`;
                });
                html += `</div>
                    <button onclick="startQuiz([${list.indexOf(q)}])" class="mt-2 bg-blue-500 text-white px-3 py-1 rounded text-xs">答题</button>
                </div>`;
            });
            document.getElementById('questionList').innerHTML = html;
        }
        
        function filterQuestions(chapter) {
            if(chapter === 'all') {
                renderQuestionList(questions);
            } else {
                renderQuestionList(questions.filter(q => q.chapter === chapter));
            }
        }
        
        // 答题
        function startQuiz(index) {
            quizIndex = index;
            currentQuestions = [questions[index]];
            showTab('quiz');
            renderQuiz();
        }
        
        function dailyPractice() {
            const randomIndex = Math.floor(Math.random() * questions.length);
            startQuiz(randomIndex);
        }
        
        function renderQuiz() {
            const q = currentQuestions[0];
            let html = `<p class="font-medium mb-3">${q.q}</p><div class="space-y-2">`;
            q.options.forEach((o, i) => {
                html += `<label class="flex items-center p-2 bg-gray-50 rounded cursor-pointer">
                    <input type="radio" name="answer" value="${i}" class="mr-2">
                    <span class="text-sm">${o}</span>
                </label>`;
            });
            html += `</div><div id="result" class="mt-3"></div>`;
            document.getElementById('quizContent').innerHTML = html;
        }
        
        function nextQuiz() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if(!selected) { alert('请选择一个答案'); return; }
            
            const answer = parseInt(selected.value);
            const q = currentQuestions[0];
            const result = document.getElementById('result');
            
            if(answer === q.a) {
                result.innerHTML = '<p class="text-green-500 text-sm"><i class="fa-solid fa-check"></i> 回答正确！</p>';
            } else {
                result.innerHTML = `<p class="text-red-500 text-sm"><i class="fa-solid fa-times"></i> 错误，正确答案是：${q.options[q.a]}</p>`;
                wrongAnswers.push({q: q.q, a: q.options[q.a]});
                localStorage.setItem('geo_wrong', JSON.stringify(wrongAnswers));
            }
            
            setTimeout(() => {
                showTab('home');
                renderWrongList();
            }, 1500);
        }
        
        function prevQuiz() {
            showTab('questions');
        }
        
        // 错题本
        function renderWrongList() {
            if(wrongAnswers.length === 0) {
                document.getElementById('wrongList').innerHTML = '<p class="text-center text-gray-400 py-8 text-sm">暂无错题</p>';
                return;
            }
            let html = '';
            wrongAnswers.forEach((w, i) => {
                html += `<div class="bg-white p-3 rounded-lg shadow-sm">
                    <p class="text-sm font-medium">${i+1}. ${w.q}</p>
                    <p class="text-xs text-red-500 mt-1">正确答案：${w.a}</p>
                </div>`;
            });
            document.getElementById('wrongList').innerHTML = html;
        }
        
        // 收藏
        function renderFavoritesList() {
            if(favorites.length === 0) {
                document.getElementById('favoritesList').innerHTML = '<p class="text-center text-gray-400 py-8 text-sm">暂无收藏</p>';
                return;
            }
            let html = '';
            favorites.forEach(f => {
                html += `<div class="bg-white p-3 rounded-lg shadow-sm">
                    <p class="text-sm font-medium">${f.q}</p>
                </div>`;
            });
            document.getElementById('favoritesList').innerHTML = html;
        }
        
        // 统计
        function updateStats() {
            const total = Object.keys(learned).length;
            const max = chapters.reduce((sum, ch) => sum + ch.sections.length, 0);
            const percent = Math.round((total / max) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '%';
            document.getElementById('totalQuestions').innerText = wrongAnswers.length;
            document.getElementById('correctRate').innerText = wrongAnswers.length > 0 ? '80%' : '0%';
        }
        
        // 重置
        function resetProgress() {
            if(confirm('确定重置所有进度吗？')) {
                localStorage.clear();
                wrongAnswers = [];
                favorites = [];
                learned = {};
                location.reload();
            }
        }
        
        // 登录注册
        function showLoginForm() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }
        
        function showRegisterForm() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }
        
        async function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if(!email || !password) { alert('请填写邮箱和密码'); return; }
            
            try {
                const resp = await fetch(SUPABASE_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(email), {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
                });
                const users = await resp.json();
                if(users.length > 0 && users[0].password === password) {
                    localStorage.setItem('geo_user', JSON.stringify(users[0]));
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                    document.getElementById('userEmail').innerText = users[0].email;
                    loadData();
                } else {
                    alert('邮箱或密码错误');
                }
            } catch(e) { alert('登录失败: ' + e.message); }
        }
        
        async function doRegister() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            if(!email || !password) { alert('请填写邮箱和密码'); return; }
            
            try {
                const resp = await fetch(SUPABASE_URL + '/rest/v1/users', {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ email, password })
                });
                if(resp.ok) { alert('注册成功！请登录'); showLoginForm(); }
                else { alert('注册失败'); }
            } catch(e) { alert('注册失败: ' + e.message); }
        }
        
        function logout() {
            localStorage.removeItem('geo_user');
            location.reload();
        }
    </script>
