<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中地理学习平台 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { font-size: 48px; color: #3b82f6; text-align: center; margin-bottom: 10px; }
        h1 { font-size: 22px; text-align: center; margin-bottom: 5px; color: #1f2937; }
        .subtitle { color: #6b7280; font-size: 14px; text-align: center; margin-bottom: 25px; }
        input {
            width: 100%; padding: 14px; border: 1px solid #d1d5db; border-radius: 10px;
            font-size: 14px; margin-bottom: 12px; outline: none;
        }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .btn-login { background: #3b82f6; color: white; }
        .btn-register { background: #10b981; color: white; }
        .btn-ghost { background: transparent; color: #6b7280; }
        .msg { text-align: center; font-size: 13px; margin-top: 10px; padding: 8px; border-radius: 6px; }
        .msg-error { background: #fee2e2; color: #dc2626; }
        .msg-success { background: #d1fae5; color: #059669; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎓</div>
        <h1>初中地理学习平台</h1>
        <p class="subtitle">请先登录后使用</p>

        <div id="loginForm">
            <input id="loginEmail" type="email" placeholder="请输入邮箱">
            <input id="loginPassword" type="password" placeholder="请输入密码">
            <button class="btn-login" onclick="doLogin()">登 录</button>
            <button class="btn-ghost" onclick="showRegister()">没有账号？点此注册</button>
        </div>

        <div id="registerForm" style="display:none;">
            <input id="regEmail" type="email" placeholder="请输入邮箱">
            <input id="regPassword" type="password" placeholder="至少6位密码">
            <button class="btn-register" onclick="doRegister()">注 册</button>
            <button class="btn-ghost" onclick="showLogin()">已有账号？点此登录</button>
        </div>

        <div id="msg" class="msg"></div>
    </div>

    <script>
        function showMsg(text, type) {
            var msg = document.getElementById('msg');
            msg.innerText = text;
            msg.className = 'msg';
            if (type === 'error') msg.classList.add('msg-error');
            if (type === 'success') msg.classList.add('msg-success');
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('msg').innerText = '';
        }

        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('msg').innerText = '';
        }

        function doRegister() {
            var email = document.getElementById('regEmail').value;
            var password = document.getElementById('regPassword').value;

            if(!email || !password) return showMsg('请填写邮箱和密码', 'error');
            if(password.length < 6) return showMsg('密码至少需要6位', 'error');

            // 保存到本地存储（演示用）
            var users = JSON.parse(localStorage.getItem('geo_users') || '[]');
            
            // 检查是否已存在
            for(var i=0; i<users.length; i++) {
                if(users[i].email === email) {
                    return showMsg('该邮箱已注册', 'error');
                }
            }

            users.push({email: email, password: password});
            localStorage.setItem('geo_users', JSON.stringify(users));
            
            showMsg('注册成功！请登录', 'success');
            setTimeout(showLogin, 1500);
        }

        function doLogin() {
            var email = document.getElementById('loginEmail').value;
            var password = document.getElementById('loginPassword').value;

            if(!email || !password) return showMsg('请填写邮箱和密码', 'error');

            // 从本地存储验证
            var users = JSON.parse(localStorage.getItem('geo_users') || '[]');
            var found = false;
            
            for(var i=0; i<users.length; i++) {
                if(users[i].email === email && users[i].password === password) {
                    found = true;
                    break;
                }
            }

            if(found) {
                localStorage.setItem('geo_current_user', email);
                showMsg('登录成功！即将跳转...', 'success');
                setTimeout(function() { window.location.href = 'main.html'; }, 1000);
            } else {
                showMsg('邮箱或密码错误', 'error');
            }
        }

        // 检查是否已登录
        if(localStorage.getItem('geo_current_user')) {
            window.location.href = 'main.html';
        }
    </script>
</body>
</html>
