<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中地理学习平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-indigo-600 min-h-screen flex items-center justify-center">
    
    <div class="bg-white rounded-2xl p-8 w-11/12 max-w-sm shadow-2xl">
        <i class="fa-solid fa-graduation-cap text-4xl text-blue-600 mb-3 block text-center"></i>
        <h1 class="text-xl font-bold text-center mb-1">初中地理学习平台</h1>
        <p class="text-gray-500 text-sm text-center mb-4">请先登录后使用</p>
        
        <div id="loginForm">
            <input id="loginEmail" type="email" placeholder="邮箱" class="w-full px-3 py-2 border rounded-lg mb-2 text-sm">
            <input id="loginPassword" type="password" placeholder="密码" class="w-full px-3 py-2 border rounded-lg mb-2 text-sm">
            <button id="loginBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold text-sm">登录</button>
            <button id="showRegisterBtn" class="w-full mt-2 text-blue-600 text-sm">没有账号？注册</button>
        </div>
        
        <div id="registerForm" class="hidden">
            <input id="regEmail" type="email" placeholder="邮箱" class="w-full px-3 py-2 border rounded-lg mb-2 text-sm">
            <input id="regPassword" type="password" placeholder="密码" class="w-full px-3 py-2 border rounded-lg mb-2 text-sm">
            <button id="registerBtn" class="w-full bg-green-600 text-white py-2 rounded-lg font-bold text-sm">注册</button>
            <button id="showLoginBtn" class="w-full mt-2 text-gray-500 text-sm">已有账号？登录</button>
        </div>
        
        <p id="msg" class="text-center text-sm mt-3"></p>
    </div>

    <script>
        var SUPABASE_URL = 'https://adcdrzzyhveuhxchqbcs.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_KFqWdKhpA-IJCRG3h6crvA_tEQtC4wI';
        
        document.getElementById('loginBtn').onclick = function() {
            var email = document.getElementById('loginEmail').value;
            var password = document.getElementById('loginPassword').value;
            if(!email || !password) {
                document.getElementById('msg').innerText = '请填写邮箱和密码';
                document.getElementById('msg').className = 'text-center text-sm mt-3 text-red-500';
                return;
            }
            document.getElementById('msg').innerText = '登录中...';
            
            fetch(SUPABASE_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(email), {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
            })
            .then(function(resp) { return resp.json(); })
            .then(function(users) {
                if(users.length > 0 && users[0].password === password) {
                    localStorage.setItem('geo_user', JSON.stringify(users[0]));
                    document.getElementById('msg').innerText = '登录成功！';
                    document.getElementById('msg').className = 'text-center text-sm mt-3 text-green-500';
                    setTimeout(function() { alert('登录成功！'); }, 500);
                } else {
                    document.getElementById('msg').innerText = '邮箱或密码错误';
                    document.getElementById('msg').className = 'text-center text-sm mt-3 text-red-500';
                }
            })
            .catch(function(e) {
                document.getElementById('msg').innerText = '登录失败: ' + e.message;
                document.getElementById('msg').className = 'text-center text-sm mt-3 text-red-500';
            });
        };
        
        document.getElementById('registerBtn').onclick = function() {
            var email = document.getElementById('regEmail').value;
            var password = document.getElementById('regPassword').value;
            if(!email || !password) {
                document.getElementById('msg').innerText = '请填写邮箱和密码';
                return;
            }
            document.getElementById('msg').innerText = '注册中...';
            
            fetch(SUPABASE_URL + '/rest/v1/users', {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(function(resp) {
                if(resp.ok) {
                    document.getElementById('msg').innerText = '注册成功！请登录';
                    document.getElementById('msg').className = 'text-center text-sm mt-3 text-green-500';
                    document.getElementById('loginForm').classList.remove('hidden');
                    document.getElementById('registerForm').classList.add('hidden');
                } else {
                    document.getElementById('msg').innerText = '注册失败';
                    document.getElementById('msg').className = 'text-center text-sm mt-3 text-red-500';
                }
            })
            .catch(function(e) {
                document.getElementById('msg').innerText = '注册失败: ' + e.message;
            });
        };
        
        document.getElementById('showRegisterBtn').onclick = function() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('msg').innerText = '';
        };
        
        document.getElementById('showLoginBtn').onclick = function() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('msg').innerText = '';
        };
    </script>
</body>
</html>
