<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 初中地理学习平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md rounded-3xl shadow-2xl p-8 fade-in">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-blue-100 rounded-2xl mb-4">
                <i class="fa-solid fa-earth-asia text-4xl text-blue-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">初中地理学习平台</h1>
            <p class="text-gray-500 text-sm mt-1">自主学习 · 轻松备考</p>
        </div>

        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
            <button id="tabStudent" onclick="setRole('student')" class="flex-1 py-2 rounded-lg bg-white shadow text-blue-600 font-bold transition-all">我是学生</button>
            <button id="tabTeacher" onclick="setRole('teacher')" class="flex-1 py-2 rounded-lg text-gray-500 transition-all">我是老师</button>
        </div>

        <div id="loginForm" class="space-y-4">
            <div class="relative">
                <i class="fa-regular fa-envelope absolute left-4 top-3.5 text-gray-400"></i>
                <input type="email" id="email" placeholder="邮箱地址" class="w-full pl-11 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                <input type="password" id="password" placeholder="密码 (至少6位)" class="w-full pl-11 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            
            <button onclick="handleAuth('login')" id="btnMain" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">立即登录</button>
            <button onclick="toggleMode()" id="btnSub" class="w-full text-gray-500 text-sm">没有账号？立即注册</button>
        </div>
        <div id="msg" class="mt-4 text-center text-sm hidden p-3 rounded-lg"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://adcdrzzyhveuhxchqbcs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KFqWdKhpA-IJCRG3h6crvA_tEQtC4wI';
        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentRole = 'student';
        let isLoginMode = true;

        window.setRole = function(role) {
            currentRole = role;
            document.getElementById('tabStudent').className = role === 'student' ? 'flex-1 py-2 rounded-lg bg-white shadow text-blue-600 font-bold' : 'flex-1 py-2 rounded-lg text-gray-500';
            document.getElementById('tabTeacher').className = role === 'teacher' ? 'flex-1 py-2 rounded-lg bg-white shadow text-blue-600 font-bold' : 'flex-1 py-2 rounded-lg text-gray-500';
        }

        window.toggleMode = function() {
            isLoginMode = !isLoginMode;
            document.getElementById('btnMain').innerText = isLoginMode ? '立即登录' : '创建账号';
            document.getElementById('btnSub').innerText = isLoginMode ? '没有账号？立即注册' : '已有账号？点此登录';
        }

        window.handleAuth = async function(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msg');

            if(!email || !password) {
                msgBox.className = "mt-4 text-center text-sm p-3 rounded-lg bg-red-100 text-red-700 block";
                msgBox.innerText = '请填写完整信息';
                return;
            }

            msgBox.className = "mt-4 text-center text-sm p-3 rounded-lg bg-blue-100 text-blue-700 block";
            msgBox.innerText = isLoginMode ? '登录中...' : '注册中...';

            try {
                let result;
                if(isLoginMode) {
                    result = await window.supabase.auth.signInWithPassword({ email, password });
                } else {
                    result = await window.supabase.auth.signUp({ 
                        email, password, 
                        options: { data: { role: currentRole } } 
                    });
                }

                if(result.error) throw result.error;

                msgBox.className = "mt-4 text-center text-sm p-3 rounded-lg bg-green-100 text-green-700 block";
                msgBox.innerText = isLoginMode ? "登录成功，正在跳转..." : "注册成功！请登录";
                
                if(isLoginMode) {
                    const { data: { user } } = await window.supabase.auth.getUser();
                    const role = user.user_metadata.role;
                    setTimeout(() => {
                        window.location.href = role === 'teacher' ? 'admin.html' : 'main.html';
                    }, 1000);
                }
            } catch (err) {
                msgBox.className = "mt-4 text-center text-sm p-3 rounded-lg bg-red-100 text-red-700 block";
                msgBox.innerText = err.message;
            }
        }
    </script>
</body>
</html>
