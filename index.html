<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 初中地理学习平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md rounded-3xl shadow-2xl p-8 fade-in">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-blue-100 rounded-2xl mb-4">
                <i class="fa-solid fa-earth-asia text-4xl text-blue-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">初中地理学习平台</h1>
            <p class="text-gray-500 text-sm mt-1">自主学习 · 轻松备考</p>
        </div>

        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
            <button id="tabStudent" onclick="setRole('student')" class="flex-1 py-2 rounded-lg bg-white shadow text-blue-600 font-bold transition-all">我是学生</button>
            <button id="tabTeacher" onclick="setRole('teacher')" class="flex-1 py-2 rounded-lg text-gray-500 transition-all">我是老师</button>
        </div>

        <div id="loginForm" class="space-y-4">
            <div class="relative">
                <i class="fa-solid fa-user absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="username" placeholder="用户名" class="w-full pl-11 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                <input type="password" id="password" placeholder="密码 (至少6位)" class="w-full pl-11 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            
            <button onclick="handleAuth('login')" id="btnMain" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">立即登录</button>
            <button onclick="toggleMode()" id="btnSub" class="w-full text-gray-500 text-sm">没有账号？立即注册</button>
        </div>
        <div id="msg" class="mt-4 text-center text-sm hidden p-3 rounded-lg"></div>
    </div>

    <script>
        let currentRole = 'student';
        let isLoginMode = true;

        window.setRole = function(role) {
            currentRole = role;
            document.getElementById('tabStudent').className = role === 'student' ? 'flex-1 py-2 rounded-lg bg-white shadow text-blue-600 font-bold' : 'flex-1 py-2 rounded-lg text-gray-500';
            document.getElementById('tabTeacher').className = role === 'teacher' ? 'flex-1 py-2 rounded-lg bg-white shadow text-blue-600 font-bold' : 'flex-1 py-2 rounded-lg text-gray-500';
        }

        window.toggleMode = function() {
            isLoginMode = !isLoginMode;
            document.getElementById('btnMain').innerText = isLoginMode ? '立即登录' : '创建账号';
            document.getElementById('btnSub').innerText = isLoginMode ? '没有账号？立即注册' : '已有账号？点此登录';
            hideMsg();
        }

        function showMsg(text, type) {
            const msgBox = document.getElementById('msg');
            msgBox.innerText = text;
            msgBox.className = 'mt-4 text-center text-sm p-3 rounded-lg block';
            if (type === 'error') msgBox.classList.add('bg-red-100', 'text-red-700');
            if (type === 'success') msgBox.classList.add('bg-green-100', 'text-green-700');
            if (type === 'info') msgBox.classList.add('bg-blue-100', 'text-blue-700');
        }

        function hideMsg() {
            document.getElementById('msg').className = 'mt-4 text-center text-sm hidden p-3 rounded-lg';
        }

        window.handleAuth = function(type) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msg');

            if(!username || !password) {
                showMsg('请填写用户名和密码', 'error');
                return;
            }

            if(password.length < 6) {
                showMsg('密码至少需要6位', 'error');
                return;
            }

            showMsg(isLoginMode ? '登录中...' : '注册中...', 'info');

            // 获取用户列表
            let users = JSON.parse(localStorage.getItem('geo_users') || '[]');

            if(isLoginMode) {
                // 登录逻辑
                const user = users.find(u => u.username === username && u.password === password);
                
                if(user) {
                    // 登录成功
                    localStorage.setItem('geo_current_user', JSON.stringify(user));
                    showMsg('登录成功！正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = user.role === 'teacher' ? 'admin.html' : 'main.html';
                    }, 1000);
                } else {
                    showMsg('用户名或密码错误', 'error');
                }
            } else {
                // 注册逻辑
                // 检查用户名是否已存在
                if(users.find(u => u.username === username)) {
                    showMsg('该用户名已被注册', 'error');
                    return;
                }

                // 创建新用户
                const newUser = {
                    id: Date.now(),
                    username: username,
                    password: password,
                    role: currentRole,
                    createdAt: new Date().toISOString()
                };

                users.push(newUser);
                localStorage.setItem('geo_users', JSON.stringify(users));

                showMsg('注册成功！请登录', 'success');
                setTimeout(() => {
                    isLoginMode = true;
                    document.getElementById('btnMain').innerText = '立即登录';
                    document.getElementById('btnSub').innerText = '没有账号？立即注册';
                    document.getElementById('username').value = '';
                    document.getElementById('password').value = '';
                    hideMsg();
                }, 1500);
            }
        }

        // 检查是否已登录
        const currentUser = localStorage.getItem('geo_current_user');
        if(currentUser) {
            const user = JSON.parse(currentUser);
            window.location.href = user.role === 'teacher' ? 'admin.html' : 'main.html';
        }
    </script>
</body>
</html>
