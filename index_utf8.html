<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中地理学习平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); }
        .chapter-active { border-left: 4px solid #3b82f6; background: #eff6ff; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 min-h-screen">
    
    <!-- 顶部导航 -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-globe-asia text-blue-600 text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800">初中地理学习平台</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="progressText" class="text-sm text-gray-500">学习进度: 0%</span>
                <div class="w-32 h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-blue-500 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <button onclick="resetProgress()" class="text-xs text-red-500 hover:text-red-700" title="重置进度">
                    <i class="fa-solid fa-rotate-left"></i> 重置
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8 flex gap-6">
        
        <!-- 左侧目录 -->
        <aside class="w-64 flex-shrink-0">
            <div class="bg-white rounded-xl shadow-sm p-4 sticky top-24">
                <h2 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-list text-blue-600"></i> 目录
                </h2>
                <nav id="chapterList" class="space-y-1">
                </nav>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 space-y-6">
            
            <!-- 欢迎面板 -->
            <div id="welcomePanel" class="bg-white rounded-xl shadow-sm p-8 text-center fade-in">
                <i class="fa-solid fa-earth-americas text-6xl text-blue-500 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">欢迎来到初中地理学习平台</h2>
                <p class="text-gray-600 mb-6">选择左侧章节开始学习，或点击下方按钮进行测验</p>
                <div class="flex justify-center gap-4">
                    <button onclick="startQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium transition">
                        <i class="fa-solid fa-pen-to-square mr-2"></i>开始测验
                    </button>
                    <button onclick="showRandomQuestion()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-lg font-medium transition">
                        <i class="fa-solid fa-question-circle mr-2"></i>随机一题
                    </button>
                </div>
            </div>

            <!-- 学习内容区 -->
            <div id="contentArea" class="hidden">
            </div>

            <!-- 测验区域 -->
            <div id="quizArea" class="hidden">
                <div class="bg-white rounded-xl shadow-sm p-6 fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">
                            <i class="fa-solid fa-clipboard-question text-blue-600 mr-2"></i>章节测验
                        </h2>
                        <span id="quizScore" class="text-sm text-gray-500">得分: 0</span>
                    </div>
                    
                    <div id="questionContainer">
                    </div>

                    <div class="mt-6 flex justify-between">
                        <button onclick="prevQuestion()" id="prevBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg transition disabled:opacity-50" disabled>
                            <i class="fa-solid fa-arrow-left mr-1"></i>上一题
                        </button>
                        <button onclick="nextQuestion()" id="nextBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
                            下一题<i class="fa-solid fa-arrow-right ml-1"></i>
                        </button>
                    </div>
                </div>
            </div>

        </main>

        <!-- 右侧面板 -->
        <aside class="w-72 flex-shrink-0 space-y-6">
            
            <!-- 知识卡片 -->
            <div class="bg-white rounded-xl shadow-sm p-4">
                <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-lightbulb text-yellow-500"></i> 今日知识
                </h3>
                <div id="tipCard" class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-lg p-4">
                    <p class="text-sm text-gray-700" id="tipContent">中国位于亚洲东部、太平洋西岸，是一个海陆兼备的国家。</p>
                </div>
            </div>

            <!-- 错题本 -->
            <div class="bg-white rounded-xl shadow-sm p-4">
                <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-bookmark text-red-500"></i> 错题记录
                </h3>
                <div id="wrongNotes" class="space-y-2 max-h-48 overflow-y-auto">
                    <p class="text-sm text-gray-400 text-center py-4">暂无错题</p>
                </div>
            </div>

            <!-- 收藏 -->
            <div class="bg-white rounded-xl shadow-sm p-4">
                <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-star text-yellow-500"></i> 收藏题目
                </h3>
                <div id="favorites" class="space-y-2 max-h-48 overflow-y-auto">
                    <p class="text-sm text-gray-400 text-center py-4">暂无收藏</p>
                </div>
            </div>

        </aside>
    </div>

    <script>
        // 章节数据
        const chapters = [
            {
                id: 1,
                title: '第一章：从世界看中国',
                icon: 'fa-flag',
                sections: [
                    { id: '1-1', title: '中国的地理位置', content: '中国位于亚洲东部、太平洋西岸，领土跨热带、北温带。大部分位于北温带，小部分位于热带。' },
                    { id: '1-2', title: '中国的疆域', content: '中国陆地面积约960万平方千米，居世界第三。最北端在漠河，最南端在曾母暗沙。最东端在黑龙江与乌苏里江汇合处，最西端在帕米尔高原。' },
                    { id: '1-3', title: '中国的邻国', content: '中国陆上邻国14个：朝鲜、俄罗斯、蒙古、哈萨克斯坦、吉尔吉斯斯坦、塔吉克斯坦、阿富汗、巴基斯坦、印度、尼泊尔、不丹、缅甸、老挝、越南。' },
                    { id: '1-4', title: '中国的人口', content: '中国是世界上人口最多的国家。人口分布特点：东南人口稠密，西北人口稀疏。黑河-腾冲线是中国人口地理分界线。' },
                    { id: '1-5', title: '中国的民族', content: '中国有56个民族。汉族人口最多，少数民族中壮族人口最多。民族分布特点：大散居、小聚居、交错杂居。' }
                ]
            },
            {
                id: 2,
                title: '第二章：中国的自然环境',
                icon: 'fa-mountain',
                sections: [
                    { id: '2-1', title: '中国的地形', content: '中国地形特点：地形复杂多样，山区面积广大。山区包括山地、丘陵、高原崎岖部分。山区发展旅游、林牧业，但易发生滑坡、泥石流。' },
                    { id: '2-2', title: '中国的地势', content: '中国地势特点：西高东低，呈三级阶梯分布。第一级阶梯：青藏高原；第二级阶梯：高原、盆地；第三级阶梯：平原、丘陵。' },
                    { id: '2-3', title: '主要山脉', content: '主要山脉走向：东西走向、东北-西南走向、南北走向、弧形山脉。山脉是地形骨架，构成省区分界线。' },
                    { id: '2-4', title: '中国的气候', content: '中国气候特点：气候复杂多样，季风气候显著。季风气候特点：雨热同期。冬季盛行西北风，寒冷干燥；夏季盛行东南风，温暖湿润。' },
                    { id: '2-5', title: '河流与湖泊', content: '长江：中国第一大河，世界第三长河，发源于唐古拉山脉，注入东海。黄河：中国第二长河，发源于巴颜喀拉山脉，注入渤海，含沙量最大。' }
                ]
            },
            {
                id: 3,
                title: '第三章：中国的自然资源',
                icon: 'fa-seedling',
                sections: [
                    { id: '3-1', title: '自然资源概述', content: '自然资源分为可再生资源和非可再生资源。土地、水、森林属于可再生资源，矿产资源属于非可再生资源。' },
                    { id: '3-2', title: '土地资源', content: '中国土地利用类型：耕地、林地、草地、建筑用地等。耕地主要分布在东部季风区，林地主要分布在东北、西南山地，草地主要分布在西部内陆高原。' },
                    { id: '3-3', title: '水资源', content: '中国水资源分布特点：南多北少，东多西少。年降水量分布：从东南沿海向西北内陆递减。解决措施：跨流域调水、修建水库、节约用水。' },
                    { id: '3-4', title: '南水北调', content: '南水北调工程：把长江流域的水调到华北、西北地区。东线：从扬州取水，沿京杭运河北上；中线：从丹江口水库取水，北送北京；西线：从长江上游取水。' }
                ]
            },
            {
                id: 4,
                title: '第四章：中国经济发展',
                icon: 'fa-industry',
                sections: [
                    { id: '4-1', title: '交通运输', content: '交通运输方式：铁路、公路、水路、航空、管道。铁路是中国最重要的交通运输方式。主要铁路干线：京哈线、京沪线、京九线、京广线、陇海线、沪昆线等。' },
                    { id: '4-2', title: '农业', content: '中国农业分布：东部以种植业为主，西部以畜牧业为主。种植业分布：南方水田，北方旱地。主要粮食作物：水稻、小麦。' },
                    { id: '4-3', title: '工业', content: '中国四大工业基地：辽中南（重工业）、京津唐（北方综合性）、沪宁杭（全国最大综合性）、珠江三角洲（外向型）。' },
                    { id: '4-4', title: '高新技术产业', content: '高新技术产业分布特点：东部沿海地区为主，大中城市周围。代表产业：信息技术、生物技术、新能源、新材料等。' }
                ]
            }
        ];

        // 测验题库
        const questions = [
            { chapter: 1, type: 'choice', question: '中国位于哪个大洲？', options: ['亚洲', '欧洲', '北美洲', '非洲'], answer: 0 },
            { chapter: 1, type: 'choice', question: '中国陆地面积约多少万平方千米？', options: ['960万', '9600万', '96万', '9.6万'], answer: 0 },
            { chapter: 1, type: 'choice', question: '中国最北端位于哪个省？', options: ['黑龙江', '吉林', '辽宁', '内蒙古'], answer: 0 },
            { chapter: 1, type: 'choice', question: '中国人口地理分界线是？', options: ['黑河-腾冲线', '长江-黄河线', '京沪线', '陇海线'], answer: 0 },
            { chapter: 1, type: 'choice', question: '中国56个民族中人口最多的是？', options: ['汉族', '壮族', '满族', '回族'], answer: 0 },
            { chapter: 2, type: 'choice', question: '中国地势特点是什么？', options: ['西高东低', '东高西低', '南高北低', '北高南低'], answer: 0 },
            { chapter: 2, type: 'choice', question: '中国第一级阶梯主要地形区是？', options: ['青藏高原', '内蒙古高原', '黄土高原', '云贵高原'], answer: 0 },
            { chapter: 2, type: 'choice', question: '长江注入哪个海洋？', options: ['东海', '黄海', '渤海', '南海'], answer: 0 },
            { chapter: 2, type: 'choice', question: '黄河含沙量在世界河流中排名？', options: ['第一位', '第二位', '第三位', '第四位'], answer: 0 },
            { chapter: 2, type: 'choice', question: '中国季风气候的特点是？', options: ['雨热同期', '全年温和', '全年炎热', '冬季多雨'], answer: 0 },
            { chapter: 3, type: 'choice', question: '以下哪个是非可再生资源？', options: ['矿产资源', '土地资源', '水资源', '森林资源'], answer: 0 },
            { chapter: 3, type: 'choice', question: '中国水资源分布特点是？', options: ['南多北少', '北多南少', '东多西少', '西多东少'], answer: 0 },
            { chapter: 3, type: 'choice', question: '南水北调工程中线取水地点是？', options: ['丹江口水库', '三峡', '扬州', '小浪底'], answer: 0 },
            { chapter: 3, type: 'choice', question: '中国土地利用类型中面积最大的是？', options: ['草地', '林地', '耕地', '建筑用地'], answer: 0 },
            { chapter: 4, type: 'choice', question: '中国最重要的交通运输方式是？', options: ['铁路', '公路', '航空', '水路'], answer: 0 },
            { chapter: 4, type: 'choice', question: '中国最大综合性工业基地是？', options: ['沪宁杭', '辽中南', '京津唐', '珠江三角洲'], answer: 0 },
            { chapter: 4, type: 'choice', question: '中国南方主要耕地类型是？', options: ['水田', '旱地', '草地', '林地'], answer: 0 },
            { chapter: 4, type: 'choice', question: '高新技术产业主要分布在？', options: ['东部沿海', '西部内陆', '中部地区', '南北极'], answer: 0 }
        ];

        // 学习进度
        let learnedSections = new Set();
        let wrongAnswers = [];
        let favoriteQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let questionAnswered = false;
        let currentQuizQuestions = [];
        let chapterProgress = {};

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderChapterList();
            loadProgress();
        });

        // 渲染章节列表
        function renderChapterList() {
            const list = document.getElementById('chapterList');
            list.innerHTML = chapters.map(ch => `
                <div class="mb-2">
                    <button onclick="toggleChapter(${ch.id})" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-100 flex items-center justify-between">
                        <span class="font-medium text-gray-700"><i class="fa-solid ${ch.icon} mr-2 text-blue-500"></i>${ch.title}</span>
                        <i class="fa-solid fa-chevron-down text-xs text-gray-400" id="icon-${ch.id}"></i>
                    </button>
                    <div id="sections-${ch.id}" class="ml-4 mt-1 space-y-1 hidden">
                        ${ch.sections.map(s => `
                            <button onclick="showSection(${ch.id}, '${s.id}')" class="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-blue-50 rounded-lg flex items-center">
                                <span class="flex-1">${s.title}</span>
                                <i class="fa-solid fa-check-circle text-green-500 hidden" id="check-${s.id}"></i>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 切换章节展开
        function toggleChapter(id) {
            const sections = document.getElementById(`sections-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            sections.classList.toggle('hidden');
            icon.classList.toggle('fa-chevron-down');
            icon.classList.toggle('fa-chevron-right');
        }

        // 显示章节内容
        function showSection(chapterId, sectionId) {
            const chapter = chapters.find(c => c.id === chapterId);
            const section = chapter.sections.find(s => s.id === sectionId);

            document.getElementById('welcomePanel').classList.add('hidden');
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('contentArea').classList.remove('hidden');
            document.getElementById('contentArea').innerHTML = `
                <div class="bg-white rounded-xl shadow-sm p-6 fade-in">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm">第${chapterId}章</span>
                        <h2 class="text-xl font-bold text-gray-800">${section.title}</h2>
                    </div>
                    <div class="prose max-w-none">
                        <p class="text-gray-700 leading-relaxed">${section.content}</p>
                    </div>
                    <div class="mt-6 pt-4 border-t border-gray-200">
                        <button onclick="showRelatedQuestions(${chapterId})" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
                            <i class="fa-solid fa-pen-to-square mr-2"></i>练习本章题目 (${chapterId}道题)
                        </button>
                    </div>
                </div>
            `;
        }

        // 显示相关题目
        function showRelatedQuestions(chapterId) {
            const chapterQuestions = questions.filter(q => q.chapter === chapterId);
            if (chapterQuestions.length === 0) {
                alert('暂无相关题目');
                return;
            }
            startQuiz(chapterQuestions);
        }

        // 标记章节完成
        function markChapterComplete(chapterId, questionIndex) {
            if (!chapterProgress[chapterId]) {
                chapterProgress[chapterId] = new Set();
            }
            chapterProgress[chapterId].add(questionIndex);
            
            // 检查本章所有题目是否完成
            const chapterQuestions = questions.filter(q => q.chapter === chapterId);
            if (chapterProgress[chapterId].size >= chapterQuestions.length) {
                const chapter = chapters.find(c => c.id === chapterId);
                chapter.sections.forEach(s => {
                    learnedSections.add(s.id);
                    const check = document.getElementById('check-' + s.id);
                    if (check) check.classList.remove('hidden');
                });
                saveProgress();
                updateProgress();
            }
        }

        // 开始测验
        function startQuiz(questionList = questions) {
            document.getElementById('welcomePanel').classList.add('hidden');
            document.getElementById('contentArea').classList.add('hidden');
            document.getElementById('quizArea').classList.remove('hidden');
            
            currentQuestionIndex = 0;
            score = 0;
            questionAnswered = false;
            currentQuizQuestions = questionList;
            renderQuestion();
        }

        // 随机一题
        function showRandomQuestion() {
            const randomQ = [questions[Math.floor(Math.random() * questions.length)]];
            startQuiz(randomQ);
        }

        // 打乱数组（完全随机）
        function shuffleArray(array) {
            let result = [...array];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        // 渲染题目
        function renderQuestion() {
            const q = currentQuizQuestions[currentQuestionIndex];
            const container = document.getElementById('questionContainer');
            
            // 真正随机打乱选项顺序
            const shuffled = shuffleArray([...q.options.map((opt, i) => ({ text: opt, originalIndex: i }))]);
            
            container.innerHTML = `
                <div class="fade-in">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm text-gray-500">题目 ${currentQuestionIndex + 1} / ${currentQuizQuestions.length}</span>
                        <button onclick="toggleFavorite()" class="text-yellow-500 hover:text-yellow-600"><i class="fa-solid fa-star"></i></button>
                    </div>
                    <h3 class="text-lg font-medium text-gray-800 mb-4">${q.question}</h3>
                    <div class="space-y-2">
                        ${shuffled.map((item, i) => `
                            <label class="flex items-center p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition">
                                <input type="radio" name="answer" value="${item.originalIndex}" class="mr-3" onclick="selectAnswer(${item.originalIndex})">
                                <span class="text-gray-700">${item.text}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div id="resultArea" class="mt-4"></div>
                </div>
            `;
            
            document.getElementById('quizScore').textContent = '得分: ' + score;
            updateButtons();
        }

        // 选择答案
        function selectAnswer(answerIndex) {
            if (questionAnswered) return;
            
            questionAnswered = true;
            const q = currentQuizQuestions[currentQuestionIndex];
            const isCorrect = answerIndex === q.answer;
            const resultArea = document.getElementById('resultArea');
            
            // 标记本题完成
            markChapterComplete(q.chapter, currentQuestionIndex);
            
            // 禁用所有选项
            document.querySelectorAll('input[nameforEach(input => {
                input.disabled="answer"]'). = true;
                const label = input.parentElement;
                if (parseInt(input.value) === q.answer) {
                    label.classList.add('border-green-500', 'bg-green-50');
                } else if (parseInt(input.value) === answerIndex && !isCorrect) {
                    label.classList.add('border-red-500', 'bg-red-50');
                }
            });
            
            if (isCorrect) {
                score++;
                resultArea.innerHTML = '<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded"><i class="fa-solid fa-check-circle mr-2"></i>回答正确！</div>';
            } else {
                resultArea.innerHTML = '<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"><i class="fa-solid fa-times-circle mr-2"></i>回答错误，正确答案是：' + q.options[q.answer] + '</div>';
                wrongAnswers.push({ question: q.question, answer: q.options[q.answer], yourAnswer: q.options[answerIndex] });
                updateWrongNotes();
            }
            
            document.getElementById('quizScore').textContent = '得分: ' + score;
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                questionAnswered = false;
                renderQuestion();
            }
        }

        // 下一题
        function nextQuestion() {
            if (!questionAnswered) {
                alert('请先回答当前题目');
                return;
            }
            
            if (currentQuestionIndex < currentQuizQuestions.length - 1) {
                currentQuestionIndex++;
                questionAnswered = false;
                renderQuestion();
            } else {
                alert('测验结束！最终得分：' + score + '/' + currentQuizQuestions.length);
                document.getElementById('welcomePanel').classList.remove('hidden');
                document.getElementById('quizArea').classList.add('hidden');
            }
        }

        // 更新按钮状态
        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            const nextBtn = document.getElementById('nextBtn');
            if (currentQuestionIndex === currentQuizQuestions.length - 1) {
                nextBtn.innerHTML = '完成<i class="fa-solid fa-check ml-1"></i>';
            } else {
                nextBtn.innerHTML = '下一题<i class="fa-solid fa-arrow-right ml-1"></i>';
            }
        }

        // 收藏题目
        function toggleFavorite() {
            const q = currentQuizQuestions[currentQuestionIndex];
            const exists = favoriteQuestions.find(f => f.question === q.question);
            if (exists) {
                favoriteQuestions = favoriteQuestions.filter(f => f.question !== q.question);
            } else {
                favoriteQuestions.push(q);
            }
            updateFavorites();
        }

        // 更新错题记录
        function updateWrongNotes() {
            const container = document.getElementById('wrongNotes');
            if (wrongAnswers.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">暂无错题</p>';
                return;
            }
            container.innerHTML = wrongAnswers.map((w, i) => `
                <div class="bg-red-50 p-2 rounded text-xs">
                    <p class="font-medium text-gray-700">${i + 1}. ${w.question}</p>
                    <p class="text-red-600">你的答案：${w.yourAnswer}</p>
                    <p class="text-green-600">正确答案：${w.answer}</p>
                </div>
            `).join('');
        }

        // 更新收藏
        function updateFavorites() {
            const container = document.getElementById('favorites');
            if (favoriteQuestions.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">暂无收藏</p>';
                return;
            }
            container.innerHTML = favoriteQuestions.map((f, i) => `
                <div class="bg-yellow-50 p-2 rounded text-xs cursor-pointer hover:bg-yellow-100" onclick="loadFavorite(${i})">
                    <p class="font-medium text-gray-700">${i + 1}. ${f.question}</p>
                </div>
            `).join('');
        }

        // 加载收藏
        function loadFavorite(index) {
            startQuiz([favoriteQuestions[index]]);
        }

        // 保存进度
        function saveProgress() {
            localStorage.setItem('geo_learned', JSON.stringify([...learnedSections]));
            localStorage.setItem('geo_wrong', JSON.stringify(wrongAnswers));
            localStorage.setItem('geo_favorite', JSON.stringify(favoriteQuestions));
            localStorage.setItem('geo_chapter_progress', JSON.stringify(Object.fromEntries(
                Object.entries(chapterProgress).map(([k, v]) => [k, [...v]])
            )));
        }

        // 加载进度
        function loadProgress() {
            const saved = localStorage.getItem('geo_learned');
            if (saved) {
                learnedSections = new Set(JSON.parse(saved));
                learnedSections.forEach(id => {
                    const check = document.getElementById('check-' + id);
                    if (check) check.classList.remove('hidden');
                });
            }
            
            const savedWrong = localStorage.getItem('geo_wrong');
            if (savedWrong) {
                wrongAnswers = JSON.parse(savedWrong);
                updateWrongNotes();
            }
            
            const savedFav = localStorage.getItem('geo_favorite');
            if (savedFav) {
                favoriteQuestions = JSON.parse(savedFav);
                updateFavorites();
            }
            
            const savedChapter = localStorage.getItem('geo_chapter_progress');
            if (savedChapter) {
                chapterProgress = Object.fromEntries(
                    Object.entries(JSON.parse(savedChapter)).map(([k, v]) => [k, new Set(v)])
                );
            }
            
            updateProgress();
        }

        // 更新进度条
        function updateProgress() {
            const total = chapters.reduce((sum, ch) => sum + ch.sections.length, 0);
            const percent = Math.round((learnedSections.size / total) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = '学习进度: ' + percent + '%';
        }

        // 重置进度
        function resetProgress() {
            if (confirm('确定要重置所有学习进度吗？')) {
                learnedSections = new Set();
                wrongAnswers = [];
                favoriteQuestions = [];
                chapterProgress = {};
                localStorage.removeItem('geo_learned');
                localStorage.removeItem('geo_wrong');
                localStorage.removeItem('geo_favorite');
                localStorage.removeItem('geo_chapter_progress');
                document.querySelectorAll('[id^="check-"]').forEach(el => el.classList.add('hidden'));
                updateProgress();
                updateWrongNotes();
                updateFavorites();
                alert('进度已重置！');
            }
        }
    </script>
</body>
</html>
