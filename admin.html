<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col">
        <div class="p-6 text-white font-bold text-xl flex items-center gap-3 bg-slate-800">
            <i class="fa-solid fa-chalkboard-user text-blue-400"></i>管理后台
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="#" class="block px-4 py-3 bg-blue-600 text-white rounded-xl flex items-center gap-3">
                <i class="fa-solid fa-layer-group"></i> 知识点管理
            </a>
            <a href="#" class="block px-4 py-3 hover:bg-slate-800 rounded-xl flex items-center gap-3">
                <i class="fa-solid fa-database"></i> 题库维护
            </a>
            <a href="#" class="block px-4 py-3 hover:bg-slate-800 rounded-xl flex items-center gap-3">
                <i class="fa-solid fa-users"></i> 学生数据
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="location.href='index.html'" class="w-full py-2 border border-slate-700 rounded-lg text-sm hover:bg-red-500 hover:text-white transition-all">退出系统</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-auto">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <h2 class="font-bold text-gray-700">内容列表</h2>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm shadow-lg shadow-blue-100">+ 新增内容</button>
        </header>

        <div class="p-8">
            <div class="grid grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-gray-400 text-sm">累计学生</p>
                    <p class="text-3xl font-bold mt-1">1,204</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-gray-400 text-sm">今日练习数</p>
                    <p class="text-3xl font-bold mt-1 text-green-500">358</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-gray-400 text-sm">待批改试卷</p>
                    <p class="text-3xl font-bold mt-1 text-orange-500">12</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4 text-xs font-bold text-gray-400 uppercase">章节名称</th>
                            <th class="p-4 text-xs font-bold text-gray-400 uppercase">年级</th>
                            <th class="p-4 text-xs font-bold text-gray-400 uppercase">最后更新</th>
                            <th class="p-4 text-xs font-bold text-gray-400 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y text-sm">
                        <tr>
                            <td class="p-4 font-medium">中国的疆域</td>
                            <td class="p-4"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs">七年级</span></td>
                            <td class="p-4 text-gray-400">2026-03-05</td>
                            <td class="p-4 text-blue-600 cursor-pointer">编辑 / 删除</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
